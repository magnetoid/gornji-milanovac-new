version: 1
directus: 10.10.0

collections:
  - collection: categories
    meta:
      accountability: all
      archive_app_filter: true
      archive_field: null
      archive_value: null
      collapse: open
      collection: categories
      color: null
      display_template: "{{name}}"
      group: null
      hidden: false
      icon: folder
      item_duplication_fields: null
      note: Kategorije vesti
      preview_url: null
      singleton: false
      sort: null
      sort_field: null
      translations: null
      unarchive_value: null
      versioning: false
    schema:
      name: categories

  - collection: tags
    meta:
      accountability: all
      collection: tags
      display_template: "{{name}}"
      hidden: false
      icon: label
      note: Tagovi za vesti
      singleton: false
    schema:
      name: tags

  - collection: posts
    meta:
      accountability: all
      archive_app_filter: true
      archive_field: status
      archive_value: archived
      collection: posts
      display_template: "{{title}}"
      hidden: false
      icon: article
      note: Vesti i članci
      singleton: false
      sort_field: null
    schema:
      name: posts

  - collection: posts_tags
    meta:
      collection: posts_tags
      hidden: true
      icon: import_export
    schema:
      name: posts_tags

  - collection: pages
    meta:
      accountability: all
      collection: pages
      display_template: "{{title}}"
      hidden: false
      icon: description
      note: Statične stranice
      singleton: false
    schema:
      name: pages

  - collection: listings_categories
    meta:
      accountability: all
      collection: listings_categories
      display_template: "{{name}}"
      hidden: false
      icon: category
      note: Kategorije oglasa
      singleton: false
    schema:
      name: listings_categories

  - collection: listings
    meta:
      accountability: all
      collection: listings
      display_template: "{{title}}"
      hidden: false
      icon: storefront
      note: Mali oglasi
      singleton: false
    schema:
      name: listings

  - collection: listings_files
    meta:
      collection: listings_files
      hidden: true
      icon: import_export
    schema:
      name: listings_files

  # ===== MARKETPLACE COLLECTIONS =====

  - collection: vendors
    meta:
      accountability: all
      archive_app_filter: true
      archive_field: status
      archive_value: archived
      collection: vendors
      display_template: "{{name}}"
      hidden: false
      icon: storefront
      note: Prodavci na marketplace-u
      singleton: false
    schema:
      name: vendors

  - collection: products
    meta:
      accountability: all
      archive_app_filter: true
      archive_field: status
      archive_value: archived
      collection: products
      display_template: "{{title}}"
      hidden: false
      icon: inventory_2
      note: Proizvodi za prodaju
      singleton: false
    schema:
      name: products

  - collection: products_files
    meta:
      collection: products_files
      hidden: true
      icon: import_export
    schema:
      name: products_files

  - collection: services
    meta:
      accountability: all
      archive_app_filter: true
      archive_field: status
      archive_value: archived
      collection: services
      display_template: "{{title}}"
      hidden: false
      icon: home_repair_service
      note: Usluge sa rezervacijama
      singleton: false
    schema:
      name: services

  - collection: services_files
    meta:
      collection: services_files
      hidden: true
      icon: import_export
    schema:
      name: services_files

  - collection: bookings
    meta:
      accountability: all
      collection: bookings
      display_template: "{{customer_name}} - {{requested_date}}"
      hidden: false
      icon: calendar_month
      note: Rezervacije usluga
      singleton: false
    schema:
      name: bookings

fields:
  # Categories
  - collection: categories
    field: id
    type: integer
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: categories
    field: name
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: categories
    field: slug
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false
      is_unique: true

  - collection: categories
    field: description
    type: text
    meta:
      interface: input-multiline
    schema:
      is_nullable: true

  - collection: categories
    field: parent
    type: integer
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
    schema:
      is_nullable: true

  - collection: categories
    field: wp_id
    type: integer
    meta:
      interface: input
      note: ID iz WordPress-a za migraciju
    schema:
      is_nullable: true

  # Tags
  - collection: tags
    field: id
    type: integer
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: tags
    field: name
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: tags
    field: slug
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false
      is_unique: true

  - collection: tags
    field: wp_id
    type: integer
    meta:
      interface: input
      note: ID iz WordPress-a za migraciju
    schema:
      is_nullable: true

  # Posts
  - collection: posts
    field: id
    type: integer
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: posts
    field: title
    type: string
    meta:
      interface: input
      required: true
      width: full
    schema:
      is_nullable: false

  - collection: posts
    field: slug
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false
      is_unique: true

  - collection: posts
    field: content
    type: text
    meta:
      interface: input-rich-text-html
      width: full
    schema:
      is_nullable: true

  - collection: posts
    field: excerpt
    type: text
    meta:
      interface: input-multiline
      width: full
    schema:
      is_nullable: true

  - collection: posts
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Objavljeno
            value: published
          - text: Nacrt
            value: draft
          - text: Zakazano
            value: scheduled
          - text: Arhivirano
            value: archived
      default_value: draft
      width: half
    schema:
      is_nullable: false
      default_value: draft

  - collection: posts
    field: featured_image
    type: uuid
    meta:
      interface: file-image
      special:
        - file
    schema:
      is_nullable: true

  - collection: posts
    field: author
    type: uuid
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
      width: half
    schema:
      is_nullable: true

  - collection: posts
    field: published_at
    type: timestamp
    meta:
      interface: datetime
      width: half
    schema:
      is_nullable: true

  - collection: posts
    field: category
    type: integer
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
      width: half
    schema:
      is_nullable: true

  - collection: posts
    field: tags
    type: alias
    meta:
      interface: list-m2m
      special:
        - m2m
    schema: null

  - collection: posts
    field: source_url
    type: string
    meta:
      interface: input
      note: Originalni URL članka
      width: half
    schema:
      is_nullable: true

  - collection: posts
    field: source_name
    type: string
    meta:
      interface: input
      note: Naziv izvora (npr. GM Info, Telegraf)
      width: half
    schema:
      is_nullable: true

  - collection: posts
    field: wp_id
    type: integer
    meta:
      interface: input
      note: ID iz WordPress-a za migraciju
      hidden: true
    schema:
      is_nullable: true

  # Posts_Tags junction
  - collection: posts_tags
    field: id
    type: integer
    meta:
      hidden: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: posts_tags
    field: posts_id
    type: integer
    schema: {}

  - collection: posts_tags
    field: tags_id
    type: integer
    schema: {}

  # Pages
  - collection: pages
    field: id
    type: integer
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: pages
    field: title
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false

  - collection: pages
    field: slug
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false
      is_unique: true

  - collection: pages
    field: content
    type: text
    meta:
      interface: input-rich-text-html
    schema:
      is_nullable: true

  - collection: pages
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Objavljeno
            value: published
          - text: Nacrt
            value: draft
      default_value: draft
    schema:
      is_nullable: false
      default_value: draft

  # Listings Categories
  - collection: listings_categories
    field: id
    type: integer
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: listings_categories
    field: name
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: listings_categories
    field: slug
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false
      is_unique: true

  # Listings
  - collection: listings
    field: id
    type: integer
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: listings
    field: title
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false

  - collection: listings
    field: slug
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false
      is_unique: true

  - collection: listings
    field: content
    type: text
    meta:
      interface: input-rich-text-html
    schema:
      is_nullable: true

  - collection: listings
    field: price
    type: decimal
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true
      numeric_precision: 10
      numeric_scale: 2

  - collection: listings
    field: category
    type: integer
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
      width: half
    schema:
      is_nullable: true

  - collection: listings
    field: contact_email
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: listings
    field: contact_phone
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: listings
    field: location
    type: string
    meta:
      interface: input
    schema:
      is_nullable: true

  - collection: listings
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Aktivan
            value: active
          - text: Neaktivan
            value: inactive
          - text: Prodat
            value: sold
      default_value: active
      width: half
    schema:
      is_nullable: false
      default_value: active

  - collection: listings
    field: images
    type: alias
    meta:
      interface: files
      special:
        - files
    schema: null

  - collection: listings
    field: expires_at
    type: timestamp
    meta:
      interface: datetime
      width: half
    schema:
      is_nullable: true

  # Listings_Files junction
  - collection: listings_files
    field: id
    type: integer
    meta:
      hidden: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: listings_files
    field: listings_id
    type: integer
    schema: {}

  - collection: listings_files
    field: directus_files_id
    type: uuid
    schema: {}

  # ===== MARKETPLACE FIELDS =====

  # Vendors
  - collection: vendors
    field: id
    type: uuid
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true

  - collection: vendors
    field: date_created
    type: timestamp
    meta:
      interface: datetime
      readonly: true
      special:
        - date-created
    schema:
      is_nullable: true

  - collection: vendors
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Objavljen
            value: published
          - text: Nacrt
            value: draft
          - text: Na čekanju
            value: pending
      default_value: pending
      width: half
    schema:
      is_nullable: false
      default_value: pending

  - collection: vendors
    field: name
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: vendors
    field: slug
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false
      is_unique: true

  - collection: vendors
    field: description
    type: text
    meta:
      interface: input-rich-text-html
    schema:
      is_nullable: true

  - collection: vendors
    field: logo
    type: uuid
    meta:
      interface: file-image
      special:
        - file
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: cover_image
    type: uuid
    meta:
      interface: file-image
      special:
        - file
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: category
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Farma
            value: farma
          - text: Zanatstvo
            value: zanatstvo
          - text: Usluge
            value: usluge
          - text: Trgovina
            value: trgovina
          - text: Turizam
            value: turizam
          - text: Ostalo
            value: ostalo
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: location
    type: string
    meta:
      interface: input
      width: half
      note: npr. Gornji Milanovac, Rudnik, Banja
    schema:
      is_nullable: true

  - collection: vendors
    field: phone
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: email
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: website
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: facebook
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: instagram
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: vendors
    field: working_hours
    type: text
    meta:
      interface: input-multiline
      note: npr. Pon-Pet 8-16h
    schema:
      is_nullable: true

  - collection: vendors
    field: featured
    type: boolean
    meta:
      interface: boolean
      special:
        - cast-boolean
      width: half
    schema:
      is_nullable: true
      default_value: false

  # Products
  - collection: products
    field: id
    type: uuid
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true

  - collection: products
    field: date_created
    type: timestamp
    meta:
      interface: datetime
      readonly: true
      special:
        - date-created
    schema:
      is_nullable: true

  - collection: products
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Objavljen
            value: published
          - text: Nacrt
            value: draft
      default_value: draft
      width: half
    schema:
      is_nullable: false
      default_value: draft

  - collection: products
    field: vendor_id
    type: uuid
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
      width: half
    schema:
      is_nullable: true

  - collection: products
    field: title
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false

  - collection: products
    field: slug
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false
      is_unique: true

  - collection: products
    field: description
    type: text
    meta:
      interface: input-rich-text-html
    schema:
      is_nullable: true

  - collection: products
    field: price
    type: decimal
    meta:
      interface: input
      width: half
      note: Ostavite prazno za "Po dogovoru"
    schema:
      is_nullable: true
      numeric_precision: 10
      numeric_scale: 2

  - collection: products
    field: price_unit
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Komad
            value: kom
          - text: Kilogram
            value: kg
          - text: Litar
            value: l
          - text: Usluga
            value: usluga
        allowOther: true
      width: half
    schema:
      is_nullable: true

  - collection: products
    field: images
    type: alias
    meta:
      interface: files
      special:
        - files
    schema: null

  - collection: products
    field: category
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Hrana
            value: hrana
          - text: Piće
            value: pice
          - text: Meso
            value: meso
          - text: Voće i povrće
            value: voce_povrce
          - text: Mlečni proizvodi
            value: mlecni
          - text: Med
            value: med
          - text: Prerađevine
            value: preradjevine
          - text: Zanatski proizvodi
            value: zanatski
          - text: Ostalo
            value: ostalo
      width: half
    schema:
      is_nullable: true

  - collection: products
    field: available
    type: boolean
    meta:
      interface: boolean
      special:
        - cast-boolean
      width: half
    schema:
      is_nullable: true
      default_value: true

  - collection: products
    field: contact_phone
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: products
    field: contact_email
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: products
    field: featured
    type: boolean
    meta:
      interface: boolean
      special:
        - cast-boolean
      width: half
    schema:
      is_nullable: true
      default_value: false

  # Products_Files junction
  - collection: products_files
    field: id
    type: integer
    meta:
      hidden: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: products_files
    field: products_id
    type: uuid
    schema: {}

  - collection: products_files
    field: directus_files_id
    type: uuid
    schema: {}

  # Services
  - collection: services
    field: id
    type: uuid
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true

  - collection: services
    field: date_created
    type: timestamp
    meta:
      interface: datetime
      readonly: true
      special:
        - date-created
    schema:
      is_nullable: true

  - collection: services
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Objavljen
