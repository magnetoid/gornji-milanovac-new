      is_nullable: true

  - collection: services
    field: contact_phone
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: services
    field: contact_email
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  # Services_Files junction
  - collection: services_files
    field: id
    type: integer
    meta:
      hidden: true
    schema:
      is_primary_key: true
      has_auto_increment: true

  - collection: services_files
    field: services_id
    type: uuid
    schema: {}

  - collection: services_files
    field: directus_files_id
    type: uuid
    schema: {}

  # Bookings
  - collection: bookings
    field: id
    type: uuid
    meta:
      hidden: true
      interface: input
      readonly: true
    schema:
      is_primary_key: true

  - collection: bookings
    field: date_created
    type: timestamp
    meta:
      interface: datetime
      readonly: true
      special:
        - date-created
    schema:
      is_nullable: true

  - collection: bookings
    field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Na čekanju
            value: pending
          - text: Potvrđeno
            value: confirmed
          - text: Otkazano
            value: cancelled
      default_value: pending
      width: half
    schema:
      is_nullable: false
      default_value: pending

  - collection: bookings
    field: service_id
    type: uuid
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
      width: half
    schema:
      is_nullable: true

  - collection: bookings
    field: vendor_id
    type: uuid
    meta:
      interface: select-dropdown-m2o
      special:
        - m2o
      width: half
    schema:
      is_nullable: true

  - collection: bookings
    field: customer_name
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: bookings
    field: customer_email
    type: string
    meta:
      interface: input
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: bookings
    field: customer_phone
    type: string
    meta:
      interface: input
      width: half
    schema:
      is_nullable: true

  - collection: bookings
    field: requested_date
    type: date
    meta:
      interface: datetime
      required: true
      width: half
    schema:
      is_nullable: false

  - collection: bookings
    field: requested_time
    type: string
    meta:
      interface: input
      width: half
      note: npr. "09:00", "14:30"
    schema:
      is_nullable: true

  - collection: bookings
    field: message
    type: text
    meta:
      interface: input-multiline
    schema:
      is_nullable: true

  - collection: bookings
    field: notes
    type: text
    meta:
      interface: input-multiline
      note: Beleške prodavca
    schema:
      is_nullable: true

