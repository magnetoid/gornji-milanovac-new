version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gornji_milanovac
      POSTGRES_USER: gm_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gm_user -d gornji_milanovac"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gornji_milanovac
      DB_USER: gm_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_ROOT: /directus/uploads
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-https://api.new.gornji-milanovac.com}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
      - ./directus/snapshot.yaml:/directus/snapshot.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://new.gornji-milanovac.com}
      NEXT_PUBLIC_DIRECTUS_URL: ${DIRECTUS_PUBLIC_URL:-https://api.new.gornji-milanovac.com}
    depends_on:
      - directus

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
