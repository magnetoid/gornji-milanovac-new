      is_nullable: true
      numeric_precision: 10
      numeric_scale: 2

  - collection: services
    field: price_label
    type: string
    meta:
      interface: input
      width: half
      note: npr. "od 500 RSD", "po dogovoru"
    schema:
      is_nullable: true

  - collection: services
    field: images
    type: alias
    meta:
      interface: files
      special:
        - files
    schema: null

  - collection: services
    field: category
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Popravke
            value: popravke
          - text: Građevina
            value: gradjevina
          - text: Lepota
            value: lepota
          - text: Zdravlje
            value: zdravlje
          - text: Edukacija
            value: edukacija
          - text: Prevoz
            value: prevoz
          - text: Ugostiteljstvo
            value: ugostitelstvo
          - text: Ostalo
            value: ostalo
