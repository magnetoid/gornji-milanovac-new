      is_nullable: true

  - collection: services
    field: booking_enabled
    type: boolean
    meta:
      interface: boolean
      special:
        - cast-boolean
      width: half
    schema:
      is_nullable: true
      default_value: true

  - collection: services
    field: available_days
    type: text
    meta:
      interface: input-multiline
      note: JSON niz dana npr. ["mon","tue","wed","thu","fri"]
