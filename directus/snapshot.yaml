      width: half
    schema:
      is_nullable: true

  - collection: services
    field: title
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false

  - collection: services
    field: slug
    type: string
    meta:
      interface: input
      required: true
    schema:
      is_nullable: false
      is_unique: true

  - collection: services
    field: description
    type: text
    meta:
      interface: input-rich-text-html
    schema:
      is_nullable: true

  - collection: services
    field: price_from
